<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Courier</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Neon Courier</h1>
      <p>Choose a contract, survive the route, deliver on time, and upgrade your bike.</p>
    </header>

    <section class="hud" id="hud"></section>

    <section class="panel" id="panel"></section>

    <section class="game-wrap">
      <canvas id="game" width="960" height="540" aria-label="Neon Courier game canvas"></canvas>
      <div class="legend">
        <span><i class="swatch player"></i>Courier</span>
        <span><i class="swatch dest"></i>Destination</span>
        <span><i class="swatch gang"></i>Gang</span>
        <span><i class="swatch patrol"></i>Patrol</span>
        <span><i class="swatch flood"></i>Flooded lane</span>
      </div>
    </section>

    <section class="controls">
      <strong>Controls:</strong> WASD / Arrow keys to move. Reach the beacon and avoid hazards.
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
